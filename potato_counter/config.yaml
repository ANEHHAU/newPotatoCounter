# Potato Counter Configuration Settings
video:
  source: "default" # "default" or path to video file
  input_fps: 30
  processing_fps_limit: 30
  resolution: [1920, 1080]

pipeline:
  confidence_threshold: 0.5
  iou_threshold: 0.3
  clahe_clip_limit: 2.0
  brightness: 0
  contrast: 0
  enable_otsu: false

zones:
  roi: [] # List of [x, y] coordinates
  define_zone: [] # List of [x, y] coordinates
  count_line: null # [[x1, y1], [x2, y2]]

operating_mode: 1 # 1: Good/Defect, 2: Full Analysis
